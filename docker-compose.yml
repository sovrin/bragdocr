services:
    brag:
        build: .
        volumes:
            - ./brags:/app/brags
        restart: unless-stopped
        ports:
            - '3000:3000'

    auth:
        image: quay.io/oauth2-proxy/oauth2-proxy:latest
        ports:
            - '4180:4180'
        volumes:
            - ./templates:/templates:ro
        env_file: .env
        command:
            - --http-address=0.0.0.0:4180
            - --provider=google
            - --redirect-url=${OAUTH2_PROXY_REDIRECT_URL}
            - --email-domain=${OAUTH2_PROXY_EMAIL_DOMAIN}
            - --cookie-secure=true
            - --cookie-refresh=1h
            - --reverse-proxy=true
            - --set-xauthrequest=true
            - --upstream=static://202
            - --whitelist-domain=${OAUTH2_PROXY_WHITELIST_DOMAIN}
            - --custom-templates-dir=/templates
        depends_on:
            - brag
        restart: unless-stopped
